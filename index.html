<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olden Era - Справочник Юнитов</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #221f1c;
            --text-main: #e6ded0;
            --gold: #cfac4b;
            --border-color: #42382e;
            --tooltip-bg: #0d0c0b;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; background-image: radial-gradient(circle at center, #26211c 0%, #0d0b0a 100%); min-height: 100vh; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 36px; margin: 0 0 10px 0; letter-spacing: 2px; }
        .header p { color: #a39885; margin: 0; font-size: 16px; }

        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; }
        .tab-btn { padding: 10px 18px; background: #2d2620; border: 1px solid var(--border-color); color: #b5a894; cursor: pointer; font-family: 'Cinzel', serif; font-size: 14px; font-weight: bold; border-radius: 4px; transition: all 0.2s ease; }
        .tab-btn:hover { border-color: var(--gold); color: #fff; }
        .tab-btn.active { background: var(--gold); color: #141414; border-color: var(--gold); box-shadow: 0 0 12px rgba(207, 172, 75, 0.4); }

        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        select, input { padding: 12px 20px; background: #1c1916; border: 1px solid var(--border-color); color: var(--text-main); font-family: 'Montserrat', sans-serif; font-size: 15px; border-radius: 4px; outline: none; transition: all 0.2s; }
        select:focus, input:focus { border-color: var(--gold); box-shadow: 0 0 8px rgba(207, 172, 75, 0.3); }

        #unitsGrid { max-width: 1200px; margin: 0 auto; }
        .tier-section { display: flex; gap: 30px; margin-bottom: 60px; }
        .tier-label-container { flex: 0 0 80px; display: flex; align-items: center; justify-content: center; border-right: 2px solid var(--border-color); padding-right: 30px; }
        .tier-label { font-family: 'Cinzel', serif; font-size: 80px; color: var(--gold); text-shadow: 0 0 20px rgba(207, 172, 75, 0.4); line-height: 1; }
        .tier-cards { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.6); transition: all 0.3s ease; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 15px 30px rgba(207, 172, 75, 0.15); }
        
        .card-top-section { display: flex; background-color: #111; border-bottom: 1px solid var(--border-color); height: 180px; }
        .card-img-container { flex: 1; padding: 10px; display: flex; align-items: center; justify-content: center; }
        .card-img-half { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card-side-stats { flex: 1; padding: 15px 15px 15px 5px; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-family: 'Cinzel', serif; color: var(--gold); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; margin-bottom: 20px; }
        .stat { display: flex; justify-content: space-between; background: rgba(0, 0, 0, 0.25); padding: 6px 10px; border-radius: 4px; border: 1px solid #2d2722; }
        .stat-label { color: #9c9180; }
        .stat-value { font-weight: 700; color: #fff; }

        /* ИКОНКИ СПОСОБНОСТЕЙ И НАВЫКОВ */
        .skills-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: auto; padding-top: 15px; border-top: 1px dashed var(--border-color); }
        .skill-icon { width: 42px; height: 42px; background: #362e27; border: 2px solid var(--gold); position: relative; display: flex; align-items: center; justify-content: center; cursor: help; color: #fff; font-size: 11px; font-weight: bold; text-align: center; line-height: 1; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        /* Перенесли скругление (border-radius: inherit) прямо на картинку */
        .skill-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
        /* Убрали overflow: hidden, чтобы тултипы могли свободно "вылезать" за пределы иконки */
        .skill-icon.round { border-radius: 50%; } 
        .skill-icon.square { border-radius: 8px; }
        
        /* ВСПЛЫВАЮЩЕЕ ОКНО (TOOLTIP) */
        .tooltip { visibility: hidden; width: 260px; background-color: var(--tooltip-bg); color: #e6ded0; text-align: left; border-radius: 6px; padding: 15px; position: absolute; z-index: 999; bottom: 130%; left: 50%; transform: translateX(-50%); border: 1px solid var(--gold); box-shadow: 0 8px 20px rgba(0,0,0,0.9); opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease; font-size: 13px; font-family: 'Montserrat', sans-serif; font-weight: normal; line-height: 1.4; pointer-events: none; }
        .tooltip b { color: var(--gold); font-size: 15px; display: block; margin-bottom: 8px; font-family: 'Cinzel', serif; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .tooltip p { margin: 0; }
        .limitation { color: #ff6b6b; font-size: 11px; margin-top: 10px; font-style: italic; border-top: 1px solid #333; padding-top: 8px; display: block; }
        .tooltip::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -6px; border-width: 6px; border-style: solid; border-color: var(--gold) transparent transparent transparent; }
        .skill-icon:hover .tooltip { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(-2px); }

        .loading { text-align: center; font-size: 20px; color: var(--gold); margin-top: 50px; font-family: 'Cinzel', serif; }
        .error { color: #ff4d4d; text-align: center; margin-top: 20px; }

        @media (max-width: 768px) {
            .tier-section { flex-direction: column; gap: 20px; }
            .tier-label-container { flex: auto; border-right: none; border-bottom: 2px solid var(--border-color); padding-right: 0; padding-bottom: 15px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Olden Era: Энциклопедия</h1>
    </div>

    <div class="tabs" id="tabsContainer">
        <button class="tab-btn active" onclick="switchTab('Подземелье')">Подземелье</button>
        <button class="tab-btn" onclick="switchTab('Храм')">Храм</button>
        <button class="tab-btn" onclick="switchTab('Некрополь')">Некрополь</button>
        <button class="tab-btn" onclick="switchTab('Рой')">Рой</button>
        <button class="tab-btn" onclick="switchTab('Роща')">Роща</button>
        <button class="tab-btn" onclick="switchTab('Раскол')">Раскол</button>
        <button class="tab-btn" onclick="switchTab('Нейтралы')">Нейтралы</button>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Поиск юнита..." oninput="renderCards()">
        <select id="tierFilter" onchange="renderCards()">
            <option value="all">Все уровни (Тиры)</option>
            <option value="1">Тир 1</option>
            <option value="2">Тир 2</option>
            <option value="3">Тир 3</option>
            <option value="4">Тир 4</option>
            <option value="5">Тир 5</option>
            <option value="6">Тир 6</option>
            <option value="7">Тир 7</option>
        </select>
    </div>

    <div id="loading" class="loading">Загрузка базы данных...</div>
    <div id="error" class="error"></div>
    <div id="unitsGrid"></div>

    <script>
        const SHEET_ID = '1lTJftJX6YN6DgdnrgKmXFR7mCEePtLYxb_fNe37jksA';
        let currentSheet = 'Подземелье'; 
        let allUnits = [];
        
        // Словари для хранения данных со справочников
        let dbAbilities = {};
        let dbSkills = {};

        const COLS = {
            name: "Название RU",
            tier: "TIER",
            attack: "ATK",
            defense: "DEF",
            damageMin: "Min",
            damageMax: "Max",
            hp: "HP",
            speed: "SPD",
            initiative: "INT",
            spirit: "Spirit",
            luck: "Luck",
            abilities: "Abilities", // Навыки (пассивки)
            skills: "Skills",       // Скиллы (активки)
            image: "Image" 
        };

        // === ВНИМАНИЕ: ДОБАВЬТЕ GID ДЛЯ НОВЫХ ВКЛАДОК ===
        const SHEET_GIDS = {
            'Храм': '1574946628',
            'Некрополь': '1532107472',
            'Подземелье': '973161914',
            'Рой': '1790457249',
            'Роща': '104507128',
            'Раскол': '283333248',
            'Нейтралы': '362503447',
            'Abilities': '1045425303', // ЗАМЕНИТЕ ЭТОТ ТЕКСТ НА ЦИФРЫ ИЗ ССЫЛКИ
            'Skills': '1301175342'        // ЗАМЕНИТЕ ЭТОТ ТЕКСТ НА ЦИФРЫ ИЗ ССЫЛКИ
        };

        function switchTab(sheetName) {
            currentSheet = sheetName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === sheetName);
            });
            loadData();
        }

        // Функция-помощник для скачивания CSV
        function fetchCSV(gid) {
            return new Promise((resolve, reject) => {
                Papa.parse(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: results => resolve(results.data),
                    error: err => reject(err)
                });
            });
        }

        // Главная функция загрузки (грузит справочники 1 раз, затем юнитов)
        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('unitsGrid').innerHTML = '';
            document.getElementById('error').innerText = '';

            try {
                // Если справочники еще пусты - скачиваем их
                if (Object.keys(dbAbilities).length === 0) {
                    const abData = await fetchCSV(SHEET_GIDS['Abilities']);
                    abData.forEach(row => { if (row.Name) dbAbilities[row.Name.trim()] = row; });
                }
                if (Object.keys(dbSkills).length === 0) {
                    const skData = await fetchCSV(SHEET_GIDS['Skills']);
                    skData.forEach(row => { if (row.Name) dbSkills[row.Name.trim()] = row; });
                }

                // Скачиваем текущую фракцию
                allUnits = await fetchCSV(SHEET_GIDS[currentSheet]);
                document.getElementById('loading').style.display = 'none';
                renderCards();

            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').innerHTML = `Ошибка подключения: ${err.message}. Проверьте, вписали ли вы GID для новых вкладок!`;
            }
        }

        // Функция-генератор иконок
        function generateIconHtml(namesStr, database, folder, isRound) {
            if (!namesStr || namesStr.trim() === '') return '';
            
            let html = '';
            const names = namesStr.split(',').map(s => s.trim()).filter(s => s);
            const shapeClass = isRound ? 'round' : 'square';

            names.forEach(name => {
                const data = database[name];
                
                if (data) {
                    // Нашли в базе: формируем картинку и попап
                    const iconPath = `img/${folder}/${data.Icon}`;
                    const limitation = (data.Limitation && data.Limitation.trim() !== '') ? `<span class="limitation">${data.Limitation}</span>` : '';
                    
                    html += `
                        <div class="skill-icon ${shapeClass}">
                            <img src="${iconPath}" alt="${name}">
                            <div class="tooltip">
                                <b>${name}</b>
                                <p>${data.Text}</p>
                                ${limitation}
                            </div>
                        </div>
                    `;
                } else {
                    // Не нашли в базе: выводим красную заглушку с текстом, чтобы вы заметили опечатку
                    const short = name.substring(0, 3).toUpperCase();
                    html += `
                        <div class="skill-icon ${shapeClass}" style="border-color: red;">
                            ${short}
                            <div class="tooltip">
                                <b style="color: red;">${name}</b>
                                <p>Описание не найдено в справочнике. Проверьте опечатку в таблице.</p>
                            </div>
                        </div>
                    `;
                }
            });
            return html;
        }

        function renderCards() {
            const gridContainer = document.getElementById('unitsGrid');
            gridContainer.innerHTML = '';

            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const tierFilter = document.getElementById('tierFilter').value;

            const filteredUnits = allUnits.filter(unit => {
                const name = (unit[COLS.name] || '').toLowerCase();
                const tier = (unit[COLS.tier] || '').toString().trim();
                const matchesSearch = name.includes(searchQuery);
                const matchesTier = tierFilter === 'all' || tier === tierFilter;
                return matchesSearch && matchesTier && name.length > 0;
            });

            if (filteredUnits.length === 0) {
                gridContainer.innerHTML = '<p style="text-align:center; color: #8c8273;">Существа не найдены.</p>';
                return;
            }

            const unitsByTier = {};
            filteredUnits.forEach(unit => {
                const t = (unit[COLS.tier] || '?').toString().trim();
                if (!unitsByTier[t]) unitsByTier[t] = [];
                unitsByTier[t].push(unit);
            });

            const sortedTiers = Object.keys(unitsByTier).sort((a, b) => parseInt(a) - parseInt(b));

            sortedTiers.forEach(tier => {
                const tierSection = document.createElement('div');
                tierSection.className = 'tier-section';

                const labelContainer = document.createElement('div');
                labelContainer.className = 'tier-label-container';
                labelContainer.innerHTML = `<div class="tier-label">${tier}</div>`;
                tierSection.appendChild(labelContainer);

                const tierCards = document.createElement('div');
                tierCards.className = 'tier-cards';

                unitsByTier[tier].forEach(unit => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    // --- ГЕНЕРАЦИЯ ИКОНОК ---
                    // Активные скиллы (КВАДРАТНЫЕ, из папки img/skills)
                    const skillsHtml = generateIconHtml(unit[COLS.skills], dbSkills, 'skills', false);
                    
                    // Пассивные навыки (КРУГЛЫЕ, из папки img/abilities)
                    const abilitiesHtml = generateIconHtml(unit[COLS.abilities], dbAbilities, 'abilities', true);
                    // ------------------------

                    let imgUrl = 'https://via.placeholder.com/300x180/221f1c/cfac4b?text=Olden+Era';
                    const imageName = unit[COLS.image];
                    if (imageName && imageName.trim() !== '') {
                        imgUrl = 'img/' + imageName.trim();
                    }

                    let minD = parseInt(unit[COLS.damageMin]) || 0;
                    let maxD = parseInt(unit[COLS.damageMax]) || 0;
                    let avgD = (minD + maxD) / 2;
                    let avgStr = Number.isInteger(avgD) ? avgD : avgD.toFixed(1); 
                    let damageRange = (minD === maxD) ? minD : `${minD}-${maxD}`;

                    card.innerHTML = `
                        <div style="padding: 12px 10px; background-color: #1c1a18; border-bottom: 1px solid var(--border-color);">
                            <h2 class="card-title" style="margin: 0; font-size: 20px; text-align: center;">${unit[COLS.name] || 'Без названия'}</h2>
                        </div>

                        <div class="card-top-section">
                            <div class="card-img-container">
                                <img src="${imgUrl}" class="card-img-half" alt="${unit[COLS.name]}">
                            </div>
                            <div class="card-side-stats">
                                <div class="stat"><span class="stat-label">HP</span> <span class="stat-value">${unit[COLS.hp] || '0'}</span></div>
                                <div class="stat"><span class="stat-label">DMG</span> <span class="stat-value">${damageRange}</span></div>
                                <div class="stat"><span class="stat-label">INT</span> <span class="stat-value">${unit[COLS.initiative] || '0'}</span></div>
                                <div class="stat"><span class="stat-label">SPD</span> <span class="stat-value">${unit[COLS.speed] || '0'}</span></div>
                            </div>
                        </div>
                        
                        <div class="card-content">
                            <div class="stats-grid">
                                <div class="stat"><span class="stat-label">Атака</span> <span class="stat-value">${unit[COLS.attack] || '0'}</span></div>
                                <div class="stat"><span class="stat-label">Защита</span> <span class="stat-value">${unit[COLS.defense] || '0'}</span></div>
                                
                                <div class="stat"><span class="stat-label">Av. Damage</span> <span class="stat-value">${avgStr}</span></div>
                                <div class="stat"><span class="stat-label">Дух</span> <span class="stat-value">${unit[COLS.spirit] || '0'}</span></div>
                                
                                <div class="stat"><span class="stat-label">Удача</span> <span class="stat-value">${unit[COLS.luck] || '0'}</span></div>
                                <div class="stat"><span class="stat-label">Новый</span> <span class="stat-value">-</span></div>
                            </div>

                            <div class="skills-container">
                                ${skillsHtml}
                                ${abilitiesHtml}
                            </div>
                        </div>
                    `;

                    tierCards.appendChild(card);
                });

                tierSection.appendChild(tierCards);
                gridContainer.appendChild(tierSection);
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
